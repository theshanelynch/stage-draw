<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage Plot Renderer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            padding: 2rem;
            text-align: center;
            width: 100%;
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.5) 0%, rgba(15, 23, 42, 0) 100%);
        }

        h1 {
            margin: 0;
            font-weight: 800;
            letter-spacing: -0.025em;
            font-size: 2.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            position: relative;
            width: 95vw;
            max-width: 1100px;
            aspect-ratio: 1100 / 850;
            background: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .stage-element {
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stage-element:hover {
            filter: drop-shadow(0 0 8px var(--accent-color));
            transform: scale(1.02);
            transform-origin: center;
        }

        text {
            pointer-events: none;
            font-weight: 600;
            font-size: 14px;
        }

        .tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }

        footer {
            padding: 2rem;
            font-size: 0.875rem;
            color: #64748b;
        }

        /* SVG Specifics */
        .shape-pentagon { transform-origin: center; }
    </style>
</head>
<body>

<header>
    <h1>Stage Plot Visualization</h1>
</header>

<div class="container" id="canvas-container">
    <svg id="stage-svg" viewBox="0 0 1100 850" preserveAspectRatio="xMidYMid meet"></svg>
    <div id="tooltip" class="tooltip"></div>
</div>

<footer>
    Rendered from mxGraphModel XML
</footer>

<script>
    const xmlData = `
<mxfile host="app.diagrams.net" modified="2026-04-24T09:40:00.000Z" agent="Gemini" version="21.0.0" type="device">
  <diagram id="StagePlot" name="Absolute Positioning">
    <mxGraphModel dx="1422" dy="798" grid="1" gridSize="10" guides="1" tooltips="1" connect="1" arrows="1" fold="1" page="1" pageScale="1" pageWidth="1100" pageHeight="850" math="0" shadow="0">
      <root>
        <mxCell id="0" />
        <mxCell id="1" parent="0" />
        
        <mxCell id="stage" value="" style="verticalLabelPosition=bottom;verticalAlign=top;html=1;shape=mxgraph.basic.pentagon;fillColor=none;strokeColor=#666666;direction=south;" vertex="1" parent="1">
          <mxGeometry x="150" y="50" width="800" height="700" as="geometry" />
        </mxCell>

        <mxCell id="drums" value="Noel (Drums)" style="shape=ellipse;fillColor=#dae8fc;strokeColor=#6c8ebf;align=center;verticalAlign=middle;fontStyle=1" vertex="1" parent="1">
          <mxGeometry x="510" y="120" width="80" height="80" as="geometry" />
        </mxCell>

        <mxCell id="mon_tr" value="Monitor All" style="shape=parallelogram;fixedSize=1;fillColor=#f5f5f5;strokeColor=#666666;" vertex="1" parent="1">
          <mxGeometry x="680" y="100" width="100" height="60" as="geometry" />
        </mxCell>

        <mxCell id="eugene" value="Eugene (Voc/DI)" style="rounded=1;fillColor=#d5e8d4;strokeColor=#82b366;" vertex="1" parent="1">
          <mxGeometry x="380" y="240" width="100" height="40" as="geometry" />
        </mxCell>
        <mxCell id="gerry" value="Gerry (Amp/DI)" style="rounded=1;fillColor=#d5e8d4;strokeColor=#82b366;" vertex="1" parent="1">
          <mxGeometry x="220" y="320" width="100" height="40" as="geometry" />
        </mxCell>
        <mxCell id="mon_ml" value="Monitor All" style="shape=parallelogram;fixedSize=1;fillColor=#f5f5f5;strokeColor=#666666;" vertex="1" parent="1">
          <mxGeometry x="380" y="320" width="100" height="60" as="geometry" />
        </mxCell>

        <mxCell id="noel_b" value="Noel (Bass Amp)" style="rounded=1;fillColor=#ffe6cc;strokeColor=#d79b00;" vertex="1" parent="1">
          <mxGeometry x="620" y="280" width="110" height="40" as="geometry" />
        </mxCell>
        <mxCell id="heimar" value="Heimar (Voc/DI)" style="rounded=1;fillColor=#d5e8d4;strokeColor=#82b366;" vertex="1" parent="1">
          <mxGeometry x="820" y="240" width="100" height="40" as="geometry" />
        </mxCell>

        <mxCell id="c_m" value="Coralie | Maria" style="text;strokeColor=#b85450;fillColor=#f8cecc;align=center;verticalAlign=middle;rounded=0;" vertex="1" parent="1">
          <mxGeometry x="280" y="550" width="100" height="30" as="geometry" />
        </mxCell>
        <mxCell id="sally" value="Sally" style="text;strokeColor=#b85450;fillColor=#f8cecc;align=center;verticalAlign=middle;rounded=0;" vertex="1" parent="1">
          <mxGeometry x="400" y="550" width="80" height="30" as="geometry" />
        </mxCell>
        <mxCell id="orla" value="Orla (DI)" style="text;strokeColor=#b85450;fillColor=#f8cecc;align=center;verticalAlign=middle;rounded=0;" vertex="1" parent="1">
          <mxGeometry x="510" y="550" width="80" height="30" as="geometry" />
        </mxCell>
        <mxCell id="shane" value="Shane (Amp/DI)" style="text;strokeColor=#b85450;fillColor=#f8cecc;align=center;verticalAlign=middle;rounded=0;" vertex="1" parent="1">
          <mxGeometry x="620" y="550" width="100" height="30" as="geometry" />
        </mxCell>
        <mxCell id="ciaran" value="Ciaran (DI)" style="text;strokeColor=#b85450;fillColor=#f8cecc;align=center;verticalAlign=middle;rounded=0;" vertex="1" parent="1">
          <mxGeometry x="750" y="550" width="80" height="30" as="geometry" />
        </mxCell>

        <mxCell id="rebecca" value="Rebecca (Keys/Voc)" style="rounded=1;fillColor=#e1d5e7;strokeColor=#9673a6;" vertex="1" parent="1">
          <mxGeometry x="880" y="420" width="120" height="40" as="geometry" />
        </mxCell>

        <mxCell id="mon_vocal" value="Monitor: Vocal Mix" style="shape=parallelogram;fixedSize=1;fillColor=#f5f5f5;strokeColor=#666666;" vertex="1" parent="1">
          <mxGeometry x="400" y="650" width="120" height="60" as="geometry" />
        </mxCell>
        <mxCell id="mon_shane" value="Monitor: Voc + Shane" style="shape=parallelogram;fixedSize=1;fillColor=#f5f5f5;strokeColor=#666666;" vertex="1" parent="1">
          <mxGeometry x="620" y="650" width="130" height="60" as="geometry" />
        </mxCell>

        <!-- PALETTE / STENCILS -->
        <mxCell id="palette_label" value="EQUIPMENT PALETTE" style="text;strokeColor=none;fillColor=none;align=center;verticalAlign=middle;fontStyle=1;fontSize=14;" vertex="1" parent="1">
          <mxGeometry x="10" y="20" width="130" height="30" as="geometry" />
        </mxCell>

        <mxCell id="p_mic" value="Mic" style="shape=ellipse;fillColor=#ffffff;strokeColor=#000000;aspect=fixed;" vertex="1" parent="1">
          <mxGeometry x="50" y="60" width="30" height="30" as="geometry" />
        </mxCell>
        <mxCell id="p_mic_stand" value="" style="endArrow=none;html=1;strokeWidth=3;" edge="1" parent="1" source="p_mic">
          <mxGeometry width="50" height="50" relative="1" as="geometry">
            <mxPoint x="65" y="90" as="sourcePoint" />
            <mxPoint x="65" y="120" as="targetPoint" />
          </mxGeometry>
        </mxCell>

        <mxCell id="p_di" value="DI" style="rounded=0;fillColor=#f5f5f5;strokeColor=#666666;fontStyle=1" vertex="1" parent="1">
          <mxGeometry x="45" y="140" width="40" height="30" as="geometry" />
        </mxCell>

        <mxCell id="p_mon" value="Monitor" style="shape=parallelogram;fixedSize=1;fillColor=#f5f5f5;strokeColor=#666666;" vertex="1" parent="1">
          <mxGeometry x="30" y="190" width="70" height="40" as="geometry" />
        </mxCell>

        <mxCell id="p_drum" value="Kick" style="shape=ellipse;fillColor=#dae8fc;strokeColor=#6c8ebf;" vertex="1" parent="1">
          <mxGeometry x="35" y="250" width="60" height="60" as="geometry" />
        </mxCell>

        <mxCell id="p_keys" value="Keyboard" style="rounded=1;fillColor=#e1d5e7;strokeColor=#9673a6;" vertex="1" parent="1">
          <mxGeometry x="25" y="330" width="80" height="25" as="geometry" />
        </mxCell>

        <mxCell id="p_amp" value="Amp" style="rounded=1;fillColor=#ffe6cc;strokeColor=#d79b00;" vertex="1" parent="1">
          <mxGeometry x="35" y="375" width="60" height="50" as="geometry" />
        </mxCell>

      </root>
    </mxGraphModel>
  </diagram>
</mxfile>
    `;

    function parseStyle(styleStr) {
        const style = {};
        if (!styleStr) return style;
        styleStr.split(';').forEach(pair => {
            const [key, value] = pair.split('=');
            if (key) style[key.trim()] = value ? value.trim() : true;
        });
        return style;
    }

    function createSvgElement(tag, attrs) {
        const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
        for (const key in attrs) {
            el.setAttribute(key, attrs[key]);
        }
        return el;
    }

    function render() {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlData, "text/xml");
        const cells = xmlDoc.getElementsByTagName("mxCell");
        const svg = document.getElementById('stage-svg');
        const tooltip = document.getElementById('tooltip');

        for (const cell of cells) {
            const id = cell.getAttribute('id');
            if (id === '0' || id === '1') continue;

            const value = cell.getAttribute('value');
            const style = parseStyle(cell.getAttribute('style'));
            const geometry = cell.getElementsByTagName("mxGeometry")[0];

            if (!geometry) continue;

            const x = parseFloat(geometry.getAttribute('x')) || 0;
            const y = parseFloat(geometry.getAttribute('y')) || 0;
            const w = parseFloat(geometry.getAttribute('width')) || 0;
            const h = parseFloat(geometry.getAttribute('height')) || 0;

            let shape;
            const commonAttrs = {
                'class': 'stage-element',
                'fill': style.fillColor === 'none' || !style.fillColor ? 'transparent' : style.fillColor,
                'stroke': style.strokeColor || '#000000',
                'stroke-width': style.strokeWidth || '2',
                'data-id': id,
                'data-value': value || ''
            };

            // Handle Edges (Lines)
            if (cell.getAttribute('edge') === '1') {
                const mxPoint = geometry.getElementsByTagName('mxPoint');
                if (mxPoint.length >= 2) {
                    const x1 = parseFloat(mxPoint[0].getAttribute('x')) || x;
                    const y1 = parseFloat(mxPoint[0].getAttribute('y')) || y;
                    const x2 = parseFloat(mxPoint[1].getAttribute('x')) || x1;
                    const y2 = parseFloat(mxPoint[1].getAttribute('y')) || y1;
                    shape = createSvgElement('line', { ...commonAttrs, x1, y1, x2, y2 });
                } else if (cell.getAttribute('source')) {
                   // Simple vertical stand logic for our palette mic
                   shape = createSvgElement('line', { ...commonAttrs, x1: x+15, y1: y+30, x2: x+15, y2: y+60 });
                }
            } 
            else if (style.shape === 'mxgraph.basic.pentagon') {
                const points = [
                    `${x + w/2},${y}`,
                    `${x + w},${y + h*0.38}`,
                    `${x + w*0.81},${y + h}`,
                    `${x + w*0.19},${y + h}`,
                    `${x},${y + h*0.38}`
                ].join(' ');
                shape = createSvgElement('polygon', { ...commonAttrs, points });
                if (style.direction === 'south') {
                    shape.setAttribute('transform', `rotate(180, ${x + w/2}, ${y + h/2})`);
                }
            } else if (style.shape === 'ellipse') {
                shape = createSvgElement('ellipse', {
                    ...commonAttrs,
                    cx: x + w/2,
                    cy: y + h/2,
                    rx: w/2,
                    ry: h/2
                });
            } else if (style.shape === 'parallelogram') {
                const dx = w * 0.2;
                const points = [
                    `${x + dx},${y}`,
                    `${x + w},${y}`,
                    `${x + w - dx},${y + h}`,
                    `${x},${y + h}`
                ].join(' ');
                shape = createSvgElement('polygon', { ...commonAttrs, points });
            } else if (style.shape === 'image') {
                shape = createSvgElement('image', {
                    ...commonAttrs,
                    x, y, width: w, height: h,
                    href: style.image
                });
            } else if (style.rounded === '1') {
                shape = createSvgElement('rect', {
                    ...commonAttrs,
                    x, y, width: w, height: h,
                    rx: 8, ry: 8
                });
            } else {
                shape = createSvgElement('rect', {
                    ...commonAttrs,
                    x, y, width: w, height: h
                });
            }

            if (shape) svg.appendChild(shape);

            // Text Label
            if (value && value !== 'undefined') {
                const text = createSvgElement('text', {
                    x: x + w/2,
                    y: y + h/2,
                    'text-anchor': 'middle',
                    'dominant-baseline': 'middle',
                    'fill': '#1e293b'
                });
                
                if (id === 'stage' || id === 'palette_label') {
                   text.setAttribute('y', y + h + (id === 'stage' ? 20 : -h/2));
                   text.setAttribute('fill', id === 'stage' ? '#64748b' : '#f8fafc');
                   if (id === 'palette_label') text.setAttribute('x', x + w/2);
                }

                if (style.fillColor && ['#666666', 'none', 'transparent'].includes(style.fillColor)) {
                    text.setAttribute('fill', '#f8fafc');
                }
                
                text.textContent = value;
                svg.appendChild(text);
            }

            // Interactivity
            shape.addEventListener('mouseenter', (e) => {
                if (value) {
                    tooltip.textContent = value;
                    tooltip.style.opacity = '1';
                }
            });

            shape.addEventListener('mousemove', (e) => {
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
            });

            shape.addEventListener('mouseleave', () => {
                tooltip.style.opacity = '0';
            });
        }
    }

    window.onload = render;
</script>
</body>
</html>
